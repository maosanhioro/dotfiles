# Codex CLI portable defaults.
#
# Keep machine-local state such as [projects."/absolute/path"] trust settings in
# ~/.codex/config.toml. This file is copied only when the local config does not
# exist, so Codex can keep per-machine state without putting absolute paths in
# Git.

personality = "pragmatic"
model = "gpt-5.5"
model_reasoning_effort = "medium"
# Ubuntu 24.04: AppArmorがbwrapのネットワーク名前空間をブロックするため danger-full-access を使用
sandbox_mode = "danger-full-access"
