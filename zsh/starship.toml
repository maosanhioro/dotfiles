# starship プロンプト設定（Nerd Font 前提）
# nvim (LazyVim) の colorscheme = onedark に合わせ、色は One Half Dark で統一。
#
# 背景色で塗った角丸/矢印カプセル記号（Powerline Extra Symbols, E0B0〜E0B7）は
# GNOME Terminal(VTE) で上端が欠けて描画される既知の不具合があり、形を丸→矢印に
# 変えても解消しなかった。カプセル自体（図形＋背景色）が原因のため、背景色チップ
# 方式はやめ、前景色のテキスト＋アイコンだけで区別するフラットな配色にしている。
# Windows Terminal / GNOME Terminal のどちらでも同じ見た目になる。

"$schema" = 'https://starship.rs/config-schema.json'
add_newline = true

format = """
$hostname\
$directory\
$git_branch\
$git_status\
$git_state\
$nodejs\
$python\
$line_break\
$character"""

right_format = """$status$cmd_duration$time"""

username.disabled = true

# SSH 接続時のみ赤字で警告的に表示
[hostname]
ssh_only = true
style = 'bold #e06c75'
format = '[ @$hostname]($style) '

[directory]
style = 'bold #61afef'
truncation_length = 4
truncate_to_repo = true
read_only = ' '
read_only_style = '#e06c75'
format = '[ $path]($style)[$read_only]($read_only_style) '

[git_branch]
symbol = ''
style = 'bold #c678dd'
format = '[$symbol $branch]($style) '

# 数字だけでは種類が分からないため starship 標準の記号で区別する:
#   +staged !modified ?untracked $stashed »renamed（通常の変更＝紫）
#   ✘deleted =conflicted ⇡ahead ⇣behind ⇕diverged（注意を引きたいもの＝赤）
[git_status]
style = 'bold #c678dd'
format = '([$all_status$ahead_behind]($style)) '
staged = '[+${count}](#c678dd)'
modified = '[!${count}](#c678dd)'
untracked = '[?${count}](#c678dd)'
stashed = '[\$${count}](#c678dd)'
renamed = '[»${count}](#c678dd)'
deleted = '[✘${count}](#e06c75)'
conflicted = '[=${count}](#e06c75)'
ahead = '[⇡${count}](#e06c75)'
behind = '[⇣${count}](#e06c75)'
diverged = '[⇕⇡${ahead_count}⇣${behind_count}](#e06c75)'

# rebase / merge 中は赤字で警告
[git_state]
style = 'bold #e06c75'
format = '[ $state( $progress_current/$progress_total)]($style) '

# package.json / .nvmrc があるプロジェクトでだけ表示
[nodejs]
symbol = ''
style = 'bold #98c379'
format = '[ $symbol($version)]($style) '
detect_extensions = []
detect_files = ['package.json', '.nvmrc']
detect_folders = ['node_modules']

[python]
symbol = ''
style = 'bold #56b6c2'
format = '[ $symbol($version)( \($virtualenv\))]($style) '

# 直前コマンドの終了コード（0 以外のときだけ右側に出る）
[status]
disabled = false
symbol = '✘ '
style = 'bold red'
format = '[$symbol$status]($style) '

# 2 秒以上かかったコマンドの所要時間
[cmd_duration]
min_time = 2000
style = 'yellow'
format = '[ $duration]($style) '

[time]
disabled = false
style = '#5c6370'
time_format = '%H:%M'
format = '[ $time]($style)'

[character]
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'
